services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geopolitical
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo"]
      interval: 5s
      timeout: 3s
      retries: 5

  game-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      USE_MEMORY_STORE: "false"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://geo:geo@postgres:5432/geopolitical
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - game-engine

  rl-pipeline:
    build:
      context: ./rl-pipeline
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      GAME_ENGINE_URL: http://game-engine:8000
    depends_on:
      - game-engine
